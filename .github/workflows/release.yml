name: Release Desktop Installers

# Builds the macOS .dmg (universal Intel + Apple Silicon) and Windows .msi/.exe
# for a release and attaches them to the matching GitHub Release.
#
# Triggers:
#   - pushing a tag like v1.2.3  -> builds + publishes that tag
#   - manual run (Actions tab)   -> builds whatever ref you type (default v0.11.0)
#
# .msi can ONLY be produced on the windows-latest runner (WiX is Windows-only);
# that is the whole reason this lives in CI rather than a local mac build.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag or branch to build (e.g. v0.11.0)'
        required: true
        default: 'v0.11.0'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # -> .dmg + .app (universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: windows-latest    # -> .msi (WiX) + .exe (NSIS)
            rust-targets: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Resolve ref
        id: ref
        shell: bash
        run: echo "value=${{ github.event.inputs.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # Older tags use `VITE_BASE=/ vite build`, whose inline env var is Unix-only
      # and fails on the Windows runner. Normalise the desktop build to cross-env
      # so any historical tag builds on every platform without rewriting the tag.
      - name: Make desktop build cross-platform
        shell: bash
        run: |
          npm install -D cross-env
          npm pkg set "scripts.build:desktop=cross-env VITE_BASE=/ vite build"

      - name: Build app + publish installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bake production config into the installers so the downloaded desktop
          # app ships with Supabase (Google sign-in) + analytics live, not dormant.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        with:
          tagName: ${{ steps.ref.outputs.value }}
          releaseName: Compilearn ${{ steps.ref.outputs.value }}
          releaseBody: 'Desktop installers (.dmg for macOS, .msi/.exe for Windows). See notes on the matching release.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
