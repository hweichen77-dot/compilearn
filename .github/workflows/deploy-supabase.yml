name: Deploy Supabase Functions

# Deploys the edge functions + sets their secrets. Runs on any change under
# supabase/functions/**, or manually. Everything is gated on the
# SUPABASE_ACCESS_TOKEN repo secret; individual secrets/steps self-skip when
# their source secret is absent, so a partial config never fails the run.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/retention-cron.sql'
      - '.github/workflows/deploy-supabase.yml'

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

env:
  PROJECT_REF: usehtyzsxuyiyjdpnplv

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Require access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repo secret is not set. Generate one at" \
                 "https://supabase.com/dashboard/account/tokens and add it under" \
                 "Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set function secrets (skips any that are unset)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TUTOR_GROQ_API_KEY: ${{ secrets.TUTOR_GROQ_API_KEY }}
          INVOKE_GROQ_API_KEY: ${{ secrets.INVOKE_GROQ_API_KEY }}
          PLAYGROUND_GROQ_API_KEY: ${{ secrets.PLAYGROUND_GROQ_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RETENTION_FROM: ${{ secrets.RETENTION_FROM }}
          RETENTION_TRIGGER_SECRET: ${{ secrets.RETENTION_TRIGGER_SECRET }}
        run: |
          args=()
          for k in GROQ_API_KEY TUTOR_GROQ_API_KEY INVOKE_GROQ_API_KEY PLAYGROUND_GROQ_API_KEY RESEND_API_KEY RETENTION_FROM RETENTION_TRIGGER_SECRET; do
            v="${!k}"
            [ -n "$v" ] && args+=("$k=$v")
          done
          if [ ${#args[@]} -gt 0 ]; then
            supabase secrets set "${args[@]}" --project-ref "$PROJECT_REF"
          else
            echo "No function secrets present to set."
          fi

      - name: Deploy functions
        run: |
          set -e
          # invoke-llm (code-editor Explain, free Groq) and delete-account (GDPR
          # erasure) verify JWTs at the gateway; retention-email guards itself
          # with a shared secret and is called by pg_cron, so no JWT.
          supabase functions deploy invoke-llm     --project-ref "$PROJECT_REF"
          supabase functions deploy delete-account  --project-ref "$PROJECT_REF"
          supabase functions deploy retention-email --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Apply retention cron (only when Resend is configured)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RETENTION_TRIGGER_SECRET: ${{ secrets.RETENTION_TRIGGER_SECRET }}
        run: |
          set -e
          if [ -z "$RESEND_API_KEY" ] || [ -z "$RETENTION_TRIGGER_SECRET" ]; then
            echo "Resend not configured (RESEND_API_KEY unset) — skipping retention cron."
            exit 0
          fi
          FN_URL="https://${PROJECT_REF}.functions.supabase.co/retention-email"
          # Idempotent vault setup (delete-then-create) + the cron migration.
          {
            echo "delete from vault.secrets where name in ('retention_function_url','retention_trigger_secret');"
            echo "select vault.create_secret('${FN_URL}','retention_function_url');"
            echo "select vault.create_secret('${RETENTION_TRIGGER_SECRET}','retention_trigger_secret');"
            cat supabase/retention-cron.sql
          } > /tmp/retention.sql
          # Run via the Management API SQL endpoint (needs only the access token).
          jq -Rs '{query: .}' < /tmp/retention.sql > /tmp/retention.json
          code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "content-type: application/json" \
            --data @/tmp/retention.json)
          echo "SQL endpoint HTTP $code"
          if [ "$code" -ge 300 ]; then cat /tmp/resp.json; exit 1; fi
          echo "Retention cron applied."
